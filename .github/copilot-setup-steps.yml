name: Setup headless_sidewalkreator development environment
description: |
  Quick setup for the headless_sidewalkreator project.
  This project generates sidewalk geometries from OpenStreetMap data.
  Modern geospatial libraries are self-contained and don't require system packages.

steps:
  - name: Install Python dependencies
    run: |
      python -m pip install --upgrade pip setuptools wheel
      pip install -e .[dev]
    description: Install all runtime and development dependencies using pip

  - name: Run tests to verify setup
    run: pytest -q
    description: Run the test suite to ensure everything is working correctly

notes: |
  ## Key Dependencies
  - geopandas: Geospatial data manipulation
  - osmnx: OpenStreetMap data fetching and analysis  
  - shapely: Geometric operations
  - pytest: Testing framework

  ## Running the tool
  After setup, you can import and use the main function:
  ```python
  from headless_sidewalkreator import sidewalkreator
  result = sidewalkreator(place_name="Amherst, MA")
  ```

  ## Understanding the algorithm
  Read `data_assets/qgis_algorithm_description.md` for details on the sidewalk generation process.
